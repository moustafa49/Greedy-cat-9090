<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE BEAST V4 - BEHAVIORAL AI</title>
    <style>
        :root { --bg: #000; --main: #00ff41; --danger: #ff0000; --warn: #ffcc00; }
        body { font-family: 'monospace'; background: var(--bg); color: var(--main); margin: 0; padding: 10px; overflow-x: hidden; }
        .beast-wrap { max-width: 450px; margin: auto; border: 1px solid var(--main); border-radius: 15px; padding: 15px; background: rgba(0,255,65,0.02); }
        
        /* رادار السلوك */
        .behavior-radar { display: flex; flex-direction: column; gap: 5px; margin-bottom: 15px; padding: 10px; border: 1px solid #111; border-radius: 10px; text-align: center; }
        #radar-status { font-size: 16px; font-weight: bold; text-transform: uppercase; }
        .logic-note { font-size: 9px; color: #555; }

        .history-row { display: flex; gap: 5px; overflow-x: auto; flex-direction: row-reverse; padding: 10px 0; }
        .slot { min-width: 45px; height: 45px; background: #000; border: 1px solid #222; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 26px; }

        /* التوقعات الهجومية */
        .attack-picks { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0; }
        .target-box { background: #050505; border: 1px solid #222; border-radius: 12px; padding: 15px; text-align: center; position: relative; }
        .target-box b { font-size: 35px; display: block; margin-bottom: 5px; }
        .target-box span { font-size: 10px; color: var(--warn); font-weight: bold; }

        .input-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .i-btn { background: #000; border: 1px solid #333; padding: 20px 0; border-radius: 12px; color: #fff; position: relative; }
        .i-btn span { font-size: 30px; position: relative; z-index: 2; }
        .abs-tag { position: absolute; top: 2px; right: 4px; font-size: 8px; color: #444; }

        .btn-zone { display: flex; gap: 10px; margin-top: 20px; }
        .action-btn { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #333; background: #000; color: #555; font-size: 11px; }
    </style>
</head>
<body>

<div class="beast-wrap">
    <div class="behavior-radar">
        <div id="radar-status">ANALYZING SERVER...</div>
        <div class="logic-note">BEHAVIORAL AI ENGINE V4.2</div>
    </div>

    <div class="history-row" id="history"></div>

    <div class="attack-picks" id="picks">
        <div class="target-box"><b>?</b><span>Primary</span></div>
        <div class="target-box"><b>?</b><span>Secondary</span></div>
    </div>

    <div class="input-grid">
        <button class="i-btn" onclick="add('corn')"><div class="abs-tag" id="a-corn">0</div><span>🌽</span></button>
        <button class="i-btn" onclick="add('tomato')"><div class="abs-tag" id="a-tomato">0</div><span>🍅</span></button>
        <button class="i-btn" onclick="add('carrot')"><div class="abs-tag" id="a-carrot">0</div><span>🥕</span></button>
        <button class="i-btn" onclick="add('pepper')"><div class="abs-tag" id="a-pepper">0</div><span>🌶️</span></button>
        <button class="i-btn" onclick="add('shrimp')"><div class="abs-tag" id="a-shrimp">0</div><span>🦐</span></button>
        <button class="i-btn" onclick="add('cow')"><div class="abs-tag" id="a-cow">0</div><span>🐄</span></button>
        <button class="i-btn" onclick="add('fish')"><div class="abs-tag" id="a-fish">0</div><span>🐟</span></button>
        <button class="i-btn" onclick="add('chicken')"><div class="abs-tag" id="a-chicken">0</div><span>🐔</span></button>
    </div>

    <div class="btn-zone">
        <button class="action-btn" onclick="undo()">UNDO</button>
        <button class="action-btn" style="color:var(--danger)" onclick="reset()">RESET ALL</button>
    </div>
</div>

<script>
    const emojis = {corn:"🌽", tomato:"🍅", carrot:"🥕", pepper:"🌶️", shrimp:"🦐", cow:"🐄", fish:"🐟", chicken:"🐔"};
    const mults = {corn:5, tomato:5, carrot:5, pepper:5, shrimp:10, cow:15, fish:25, chicken:45};
    const caps = {corn:100, tomato:100, carrot:100, pepper:100, shrimp:15, cow:10, fish:6, chicken:2};
    
    let db = JSON.parse(localStorage.getItem("beast_v4_db") || "[]");

    function add(f) { db.push(f); save(); }
    function undo() { db.pop(); save(); }
    function reset() { if(confirm("تصفير؟")) { db = []; save(); } }
    function save() { localStorage.setItem("beast_v4_db", JSON.stringify(db)); update(); }

    function update() {
        const len = db.length;
        document.getElementById("history").innerHTML = db.slice(-10).map(x => `<div class="slot">${emojis[x]}</div>`).join("");
        if (len === 0) return;

        let last5 = db.slice(-5);
        let meats = ['shrimp', 'cow', 'fish', 'chicken'];
        let status = document.getElementById("radar-status");
        
        // تحليل سلوك السيرفر
        let meatGap = db.length - 1 - db.findLastIndex(x => meats.includes(x));
        
        if (meatGap > 8) {
            status.innerText = "HUNTING MODE: ON";
            status.style.color = "var(--warn)";
        } else if (last5.filter(x => meats.includes(x)).length >= 2) {
            status.innerText = "REBOUND: COOLING DOWN";
            status.style.color = "#444";
        } else {
            status.innerText = "SERVER: STABLE";
            status.style.color = "var(--main)";
        }

        let scores = {};
        Object.keys(emojis).forEach(f => {
            let lastIdx = db.lastIndexOf(f);
            let abs = (lastIdx === -1) ? len : (len - 1 - lastIdx);
            let count100 = db.slice(-100).filter(x => x === f).length;
            document.getElementById(`a-${f}`).innerText = abs;

            // خوارزمية السلوك: الغياب مضروب في "تعطش" الصنف
            let score = abs * (1 / mults[f]) * 100;
            
            // ميزة التريند الذكي
            if (abs === 0) score = 0; // بعد ما يجي يبرد
            if (abs > 15 && meats.includes(f)) score *= 1.5; // لو غاب اوي يتقل
            
            if (count100 >= caps[f]) score = -999;
            scores[f] = score;
        });

        // اختيار الهدفين الأهم (Primary & Secondary)
        let sortedMeats = meats.sort((a,b) => scores[b] - scores[a]);
        let sortedVeg = ['corn', 'tomato', 'carrot', 'pepper'].sort((a,b) => scores[b] - scores[a]);

        document.getElementById("picks").innerHTML = `
            <div class="target-box"><b>${emojis[sortedMeats[0]]}</b><span>Primary Meat (x${mults[sortedMeats[0]]})</span></div>
            <div class="target-box"><b>${emojis[sortedVeg[0]]}</b><span>Safe Veg (x5)</span></div>
        `;
    }
    window.onload = update;
</script>
</body>
</html>
