<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V1000 OMNI PRO - AI LEARNING</title>
    <style>
        :root { --bg: #050505; --panel: #0d0d0d; --gold: #ffd700; --neon: #00f2ff; --red: #ff3131; --green: #00ff88; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 5px; }
        .container { max-width: 480px; margin: auto; border: 1px solid #222; border-radius: 25px; padding: 12px; background: var(--panel); box-shadow: 0 0 30px rgba(0,0,0,0.5); }
        
        /* شاشة الحالة المتقدمة */
        .ai-dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .stat-card { background: #000; border: 1px solid #1a1a1a; padding: 10px; border-radius: 12px; text-align: center; }
        .stat-val { font-size: 18px; font-weight: bold; display: block; }
        .stat-label { font-size: 9px; color: #555; text-transform: uppercase; }

        .strip-reader { background: #000; border-radius: 15px; padding: 10px; margin-bottom: 12px; border: 1px solid #1a1a1a; }
        .history-flow { display: flex; gap: 5px; overflow-x: auto; flex-direction: row-reverse; height: 45px; align-items: center; }
        .h-node { min-width: 38px; height: 38px; background: #111; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 22px; border: 1px solid #222; }

        .picks-container { background: linear-gradient(145deg, #111, #080808); border-radius: 20px; padding: 15px; margin-bottom: 15px; border: 1px solid #222; }
        .pick-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; border-bottom: 1px solid #1a1a1a; padding-bottom: 8px; }
        .pick-label { font-size: 12px; color: var(--gold); font-weight: bold; width: 70px; }
        .pick-emojis { display: flex; gap: 8px; font-size: 26px; flex-grow: 1; justify-content: center; }

        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
        .btn { background: #111; border: 1px solid #222; border-radius: 15px; padding: 18px 0; color: #fff; position: relative; overflow: hidden; transition: 0.2s; }
        .btn:active { transform: scale(0.95); background: #1a1a1a; }
        .btn span { font-size: 32px; position: relative; z-index: 2; }
        .charge-bar { position: absolute; bottom: 0; left: 0; height: 5px; background: var(--gold); transition: width 0.3s; z-index: 1; }

        .stats-table { width: 100%; margin-top: 20px; font-size: 11px; text-align: center; border-collapse: collapse; }
        .stats-table th { color: #444; padding-bottom: 10px; border-bottom: 1px solid #222; }
        .stats-table td { padding: 12px 0; border-bottom: 1px solid #0a0a0a; }
        .hot-trend { color: var(--green); font-weight: bold; text-shadow: 0 0 8px var(--green); }
        .dead { opacity: 0.2; filter: grayscale(1); }
        
        .pulse { animation: pulse-red 1.5s infinite; }
        @keyframes pulse-red { 0% { color: var(--red); } 50% { color: #600; } 100% { color: var(--red); } }
    </style>
</head>
<body>

<div class="container">
    <div class="ai-dashboard">
        <div class="stat-card">
            <span id="pressure-val" class="stat-val">0%</span>
            <span class="stat-label">ضغط اللحوم (Pressure)</span>
        </div>
        <div class="stat-card">
            <span id="status-val" class="stat-val" style="color: var(--green);">SAFE</span>
            <span class="stat-label">حالة السيرفر (Status)</span>
        </div>
    </div>

    <div class="strip-reader">
        <div class="history-flow" id="history"></div>
    </div>

    <div class="picks-container">
        <div class="pick-row"><span class="pick-label">6 PICKS</span><div id="picks-6" class="pick-emojis"></div></div>
        <div class="pick-row"><span class="pick-label">5 PICKS</span><div id="picks-5" class="pick-emojis"></div></div>
        <div class="pick-row"><span class="pick-label">4 PICKS</span><div id="picks-4" class="pick-emojis"></div></div>
    </div>

    <div class="grid">
        <button class="btn" onclick="add('corn')"><span>🌽</span><div id="bar-corn" class="charge-bar"></div></button>
        <button class="btn" onclick="add('tomato')"><span>🍅</span><div id="bar-tomato" class="charge-bar"></div></button>
        <button class="btn" onclick="add('carrot')"><span>🥕</span><div id="bar-carrot" class="charge-bar"></div></button>
        <button class="btn" onclick="add('pepper')"><span>🌶️</span><div id="bar-pepper" class="charge-bar"></div></button>
        <button class="btn" onclick="add('shrimp')"><span>🦐</span><div id="bar-shrimp" class="charge-bar"></div></button>
        <button class="btn" onclick="add('cow')"><span>🐄</span><div id="bar-cow" class="charge-bar"></div></button>
        <button class="btn" onclick="add('fish')"><span>🐟</span><div id="bar-fish" class="charge-bar"></div></button>
        <button class="btn" onclick="add('chicken')"><span>🐔</span><div id="bar-chicken" class="charge-bar"></div></button>
    </div>

    <table class="stats-table">
        <thead><tr><th>الصنف</th><th>الضرب</th><th>الغياب</th><th>التريند</th><th>الاحتمال</th></tr></thead>
        <tbody id="radar-body"></tbody>
    </table>

    <div style="display:flex; gap:10px; margin-top:20px;">
        <button onclick="undo()" style="flex:1; padding:15px; background:#111; color:#555; border:none; border-radius:12px; font-weight:bold;">UNDO</button>
        <button onclick="reset()" style="flex:1; padding:15px; background:#200; color:#844; border:none; border-radius:12px; font-weight:bold;">RESET STRIP</button>
    </div>
</div>

<script>
    const emojis = {corn:"🌽", tomato:"🍅", carrot:"🥕", pepper:"🌶️", shrimp:"🦐", cow:"🐄", fish:"🐟", chicken:"🐔"};
    const mults = {corn:5, tomato:5, carrot:5, pepper:5, shrimp:10, cow:15, fish:25, chicken:45};
    const caps = {corn:100, tomato:100, carrot:100, pepper:100, shrimp:15, cow:10, fish:6, chicken:2}; 
    const veggies = ['corn', 'tomato', 'carrot', 'pepper'];
    const meats = ['shrimp', 'cow', 'fish', 'chicken'];
    
    let db = JSON.parse(localStorage.getItem("v1000_omni_db") || "[]");

    function add(f) { db.push(f); save(); }
    function undo() { db.pop(); save(); }
    function reset() { if(confirm("تصفير الشريط؟")) { db = []; save(); } }
    function save() { localStorage.setItem("v1000_omni_db", JSON.stringify(db)); update(); }

    function update() {
        const len = db.length;
        document.getElementById("history").innerHTML = db.slice(-20).map(x => `<div class="h-node">${emojis[x]}</div>`).join("");
        if (len === 0) return;

        let last100 = db.slice(-100);
        let last15 = db.slice(-15);
        let scores = {};

        // 1. حساب ضغط اللحوم (Pressure)
        let meatCount = last15.filter(x => meats.includes(x)).length;
        let pressure = Math.round(((15 - meatCount) / 15) * 100);
        document.getElementById("pressure-val").innerText = pressure + "%";
        
        let statusBox = document.getElementById("status-val");
        if (pressure > 70) { statusBox.innerText = "HIGH PRESSURE"; statusBox.className = "stat-val pulse"; }
        else { statusBox.innerText = "STABLE"; statusBox.className = "stat-val"; statusBox.style.color = "var(--green)"; }

        // 2. معالجة الأصناف
        Object.keys(emojis).forEach(f => {
            let lastIdx = db.lastIndexOf(f);
            let absent = (lastIdx === -1) ? len : (len - 1 - lastIdx);
            let count100 = last100.filter(x => x === f).length;
            let countLast8 = db.slice(-8).filter(x => x === f).length;
            
            // سكور الغياب المطور
            let score = absent * (35 / mults[f]);

            // نظام Trend Booster
            if (countLast8 >= 2) score += 180; // لو بيتكرر في الشريط يفضل موجود
            if (absent === 0) score += 70; // بونص الظهور الحالي

            if (count100 >= caps[f]) score = -1000;
            scores[f] = score;

            let sPct = Math.min(100, Math.max(0, Math.round(score)));
            if(document.getElementById(`bar-${f}`)) document.getElementById(`bar-${f}`).style.width = sPct + "%";
        });

        // 3. تطبيق الأنماط 3+3 و 2+2
        const getBest = (list, count) => [...list].sort((a,b) => scores[b] - scores[a]).slice(0, count);

        document.getElementById("picks-6").innerHTML = [...getBest(veggies, 3), ...getBest(meats, 3)].map(x => emojis[x]).join("");
        document.getElementById("picks-5").innerHTML = [...getBest(veggies, 3), ...getBest(meats, 2)].map(x => emojis[x]).join("");
        document.getElementById("picks-4").innerHTML = [...getBest(veggies, 2), ...getBest(meats, 2)].map(x => emojis[x]).join("");

        let tableHTML = "";
        Object.keys(emojis).forEach(f => {
            let trendCount = db.slice(-10).filter(x => x === f).length;
            tableHTML += `<tr class="${scores[f] < 0 ? 'dead':''}">
                <td>${emojis[f]}</td>
                <td>x${mults[f]}</td>
                <td style="color:${(len - 1 - db.lastIndexOf(f)) > 15 ? 'var(--gold)' : ''}">${len - 1 - db.lastIndexOf(f)}</td>
                <td class="${trendCount >= 2 ? 'hot-trend' : ''}">${trendCount}x</td>
                <td>${Math.min(100, Math.max(0, Math.round(scores[f])))}%</td>
            </tr>`;
        });
        document.getElementById("radar-body").innerHTML = tableHTML;
    }
    window.onload = update;
</script>
</body>
</html>
