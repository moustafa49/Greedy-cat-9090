<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Greedy Cat 9090 - Analyzer</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; text-align: center; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
        button { padding: 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .veg { background: #4CAF50; color: white; } /* خضار */
        .meat { background: #f44336; color: white; } /* لحوم */
        #log { background: #1e1e1e; padding: 10px; border-radius: 8px; min-height: 50px; margin-top: 20px; }
        .prediction { background: #ff9800; color: black; padding: 15px; margin: 20px 0; border-radius: 8px; font-size: 1.2em; }
    </style>
</head>
<body>

    <h1>Greedy Cat 9090 🐱</h1>
    
    <div class="prediction" id="predict-box">التوقع: سجل 5 أدوار للبدء</div>

    <div class="grid">
        <button class="veg" onclick="addRound('طماطم')">طماطم 🍅</button>
        <button class="veg" onclick="addRound('جزر')">جزر 🥕</button>
        <button class="veg" onclick="addRound('فلفل')">فلفل 🌶️</button>
        <button class="veg" onclick="addRound('درة')">درة 🌽</button>
        
        <button class="meat" onclick="addRound('جمبري')">جمبري x10</button>
        <button class="meat" onclick="addRound('جموسة')">جموسة x15</button>
        <button class="meat" onclick="addRound('سمكة')">سمكة x25</button>
        <button class="meat" onclick="addRound('كتكوت')">كتكوت x45</button>
    </div>

    <h3>آخر 5 أدوار:</h3>
    <div id="log">لا توجد بيانات بعد</div>

    <script>
        let history = [];

        function addRound(item) {
            history.push(item);
            if (history.length > 20) history.shift(); // بنحفظ آخر 20 دور بس
            updateUI();
        }

        function updateUI() {
            // تحديث السجل
            document.getElementById('log').innerText = history.slice(-5).reverse().join(' ← ');

            // منطق التوقع البسيط
            if (history.length >= 5) {
                let last5 = history.slice(-5);
                let vegCount = last5.filter(i => ['طماطم', 'جزر', 'فلفل', 'درة'].includes(i)).length;
                
                let prediction = "";
                if (vegCount >= 4) {
                    prediction = "🔥 السيرفر بارد جداً.. ركز على الجمبري أو الجموسة!";
                } else {
                    prediction = "🛡️ تذبذب.. أمن نفسك بالخضار (طماطم/فلفل)";
                }
                document.getElementById('predict-box').innerText = "التوقع: " + prediction;
            }
        }
    </script>
</body>
</html>
