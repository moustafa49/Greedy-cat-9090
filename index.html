<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V1000 - THE BEAST (AI EDITION)</title>
    <style>
        :root { --bg: #000; --panel: #080808; --gold: #ffd700; --neon: #00f2ff; --red: #ff3131; --blue: #007bff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 5px; overflow-x: hidden; }
        .container { max-width: 450px; margin: auto; border: 1px solid #222; border-radius: 20px; padding: 10px; background: var(--panel); }
        
        .machine-type { text-align: center; font-size: 11px; padding: 5px; border-radius: 50px; margin-bottom: 10px; border: 1px solid #333; transition: all 0.3s; }
        .type-stable { color: var(--blue); border-color: var(--blue); box-shadow: inset 0 0 10px rgba(0,123,255,0.2); }
        .type-chaos { color: var(--red); border-color: var(--red); box-shadow: inset 0 0 10px rgba(255,49,49,0.2); }

        .target-box { background: linear-gradient(145deg, #111, #000); border: 2px solid var(--gold); border-radius: 15px; padding: 12px; text-align: center; margin-bottom: 10px; position: relative; }
        .target-emoji { font-size: 50px; display: block; filter: drop-shadow(0 0 15px var(--gold)); }
        
        .history { display: flex; gap: 5px; overflow-x: auto; margin-bottom: 10px; padding: 8px; background: #050505; border-radius: 10px; flex-direction: row-reverse; }
        .h-node { min-width: 35px; height: 35px; background: #0a0a0a; border-radius: 5px; display: flex; align-items: center; justify-content: center; font-size: 20px; border: 1px solid #1a1a1a; }

        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .btn { background: #0a0a0a; border: 1px solid #222; border-radius: 10px; padding: 12px 0; color: #fff; position: relative; overflow: hidden; outline: none; }
        .btn:active { background: #1a1a1a; }
        .btn span { font-size: 24px; position: relative; z-index: 2; }
        
        .charge-bar { position: absolute; bottom: 0; left: 0; height: 3px; background: var(--gold); transition: width 0.3s; z-index: 1; }

        .stats-table { width: 100%; margin-top: 15px; font-size: 10px; text-align: center; color: #888; border-collapse: collapse; }
        .stats-table th { color: #444; padding-bottom: 5px; border-bottom: 1px solid #111; }
        .stats-table td { padding: 5px 0; }
        .jafala-text { font-weight: bold; }
        .blink { animation: blinker 0.6s infinite; }
        @keyframes blinker { 50% { opacity: 0.1; } }

        .sys-display { background: #000; border-radius: 10px; padding: 8px; text-align: center; margin-bottom: 10px; border: 1px solid #111; box-shadow: 0 0 15px rgba(255,255,255,0.05); }
        .sys-text { font-size: 22px; letter-spacing: 5px; color: #eee; text-shadow: 0 0 5px #fff; }
    </style>
</head>
<body>

<div class="container">
    <div id="m-type" class="machine-type">بصمة النظام: قيد التحليل...</div>
    
    <div class="target-box">
        <div id="target-emoji" class="target-emoji">❓</div>
        <div style="font-size: 10px; color: var(--gold); margin-top: 5px; font-weight: bold;">توقع الذكاء القادم</div>
    </div>

    <div class="sys-display">
        <div id="g6" class="sys-text">---</div>
    </div>

    <div id="history" class="history"></div>

    <div class="grid">
        <button class="btn" onclick="add('corn')"><span>🌽</span><div id="bar-corn" class="charge-bar"></div></button>
        <button class="btn" onclick="add('tomato')"><span>🍅</span><div id="bar-tomato" class="charge-bar"></div></button>
        <button class="btn" onclick="add('carrot')"><span>🥕</span><div id="bar-carrot" class="charge-bar"></div></button>
        <button class="btn" onclick="add('pepper')"><span>🌶️</span><div id="bar-pepper" class="charge-bar"></div></button>
        <button class="btn" onclick="add('shrimp')"><span>🦐</span><div id="bar-shrimp" class="charge-bar"></div></button>
        <button class="btn" onclick="add('cow')"><span>🐄</span><div id="bar-cow" class="charge-bar"></div></button>
        <button class="btn" onclick="add('fish')"><span>🐟</span><div id="bar-fish" class="charge-bar"></div></button>
        <button class="btn" onclick="add('chicken')"><span>🐔</span><div id="bar-chicken" class="charge-bar"></div></button>
    </div>

    <table class="stats-table">
        <thead><tr><th>الصنف</th><th>غياب</th><th>الوضع</th><th>قوة الهدف %</th></tr></thead>
        <tbody id="radar-body"></tbody>
    </table>

    <div style="display:flex; gap:5px; margin-top:10px;">
        <button onclick="undo()" style="flex:1; padding:12px; background:#151515; border:1px solid #222; color:#777; border-radius:10px; font-weight:bold;">تراجع</button>
        <button onclick="reset()" style="flex:1; padding:12px; background:#200; border:1px solid #400; color:#b33; border-radius:10px; font-weight:bold;">تصفير</button>
    </div>
</div>

<script>
    const emojis = {corn:"🌽", tomato:"🍅", carrot:"🥕", pepper:"🌶️", shrimp:"🦐", cow:"🐄", fish:"🐟", chicken:"🐔"};
    const config = {corn:16, tomato:16, carrot:16, pepper:16, shrimp:12, cow:8, fish:5, chicken:2.5};
    const veggies = ['corn', 'tomato', 'carrot', 'pepper'], meats = ['shrimp', 'cow', 'fish', 'chicken'];
    let db = JSON.parse(localStorage.getItem("v1000_db") || "[]");

    function add(f) { 
        db.push(f); 
        if(window.navigator.vibrate) window.navigator.vibrate(40);
        save(); 
    }
    function undo() { db.pop(); save(); }
    function reset() { if(confirm("هل تريد مسح السجل وتصفير الماكينة؟")) { db = []; save(); } }
    function save() { localStorage.setItem("v1000_db", JSON.stringify(db)); update(); }

    function update() {
        const len = db.length;
        document.getElementById("history").innerHTML = db.slice(-20).map(x => `<div class="h-node">${emojis[x]}</div>`).join("");
        
        if (len === 0) {
            document.getElementById("g6").innerText = "---";
            document.getElementById("target-emoji").innerText = "❓";
            document.getElementById("m-type").innerText = "بصمة النظام: في انتظار البيانات";
            return;
        }

        const recent = db.slice(-6);
        const lastMove = db[len - 1];
        const isRepeater = (len > 1 && db[len-1] === db[len-2]); // كاشف التكرار

        // تحليل نمط الماكينة
        const uniqueInRecent = [...new Set(recent)].length;
        const mType = document.getElementById("m-type");
        if(uniqueInRecent <= 3) { 
            mType.innerText = "🟦 بصمة الماكينة: مستقرة (كرّارة)"; 
            mType.className = "machine-type type-stable"; 
        } else { 
            mType.innerText = "🟥 بصمة الماكينة: متغيرة (غدّارة)"; 
            mType.className = "machine-type type-chaos"; 
        }

        let tableHTML = "", maxScore = -1, bestTarget = "";
        let aiScores = {};

        Object.keys(config).forEach(f => {
            let lastIdx = db.lastIndexOf(f);
            let abs = (lastIdx === -1) ? Math.min(len, 100) : (len - 1 - lastIdx);
            
            // حساب "الجعفلة" الأساسية (نسبة الغياب عن المعدل)
            let jafala = Math.min(100, Math.round((abs / (100 / config[f])) * 10));
            document.getElementById(`bar-${f}`).style.width = jafala + "%";

            // --- المحرك الذكي (AI Logic) ---
            let score = jafala;

            // 1. منطق التكرار: لو الماكينة بتكرر، ارفع احتمالية الصنف الأخير بدل استبعاده
            if (f === lastMove && isRepeater) {
                score += 50; 
            }
            
            // 2. منطق الاستبعاد المؤقت: لو لسه طالع مرة واحدة ومش في وضع تكرار، نزله
            if (f === lastMove && !isRepeater) {
                score -= 60;
            }

            // 3. دعم الأصناف النشطة في السلسلة الحالية
            if (recent.filter(x => x === f).length >= 2) {
                score += 25;
            }

            aiScores[f] = score;

            if (score > maxScore) { maxScore = score; bestTarget = f; }
            
            if(jafala >= 95 && window.navigator.vibrate) window.navigator.vibrate([100, 50, 100]);

            tableHTML += `<tr>
                <td>${emojis[f]}</td>
                <td>${abs}</td>
                <td style="color:${recent.includes(f)?'#0f0':'#444'}">${recent.includes(f)?'نشط':'غايب'}</td>
                <td class="jafala-text ${score>85?'blink':''}" style="color:${score>85?'#f31':'#888'}">${Math.max(0, Math.round(score))}%</td>
            </tr>`;
        });

        document.getElementById("radar-body").innerHTML = tableHTML;
        document.getElementById("target-emoji").innerText = emojis[bestTarget];

        // ترتيب الشريط العلوي بناءً على الذكاء
        let sV = veggies.sort((a,b) => aiScores[b] - aiScores[a]);
        let sM = meats.sort((a,b) => aiScores[b] - aiScores[a]);
        document.getElementById("g6").innerText = sV.slice(0,3).concat(sM.slice(0,3)).map(x => emojis[x]).join("");
    }
    window.onload = update;
</script>
</body>
</html>
