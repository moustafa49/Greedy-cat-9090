<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V100 ULTIMATE SNIPER</title>
    <style>
        :root { --bg: #050505; --panel: #0d1117; --brd: #30363d; --neon: #00f2ff; --win: #00ff41; --gold: #ffd700; --red: #ff4d4d; }
        body { font-family: sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 10px; }
        .container { max-width: 480px; margin: auto; border: 1px solid var(--brd); border-radius: 20px; padding: 15px; background: var(--panel); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .signal-bar { text-align: center; margin-bottom: 15px; padding: 12px; border-radius: 12px; font-weight: bold; font-size: 16px; border: 1px solid transparent; }
        .wait { background: rgba(255, 77, 77, 0.1); color: var(--red); border-color: var(--red); }
        .shoot { background: rgba(0, 255, 65, 0.2); color: var(--win); border-color: var(--win); box-shadow: 0 0 15px var(--win); }
        .p-card { background: #000; border: 1px solid #333; border-radius: 12px; padding: 10px 5px; text-align: center; border-bottom: 3px solid transparent; }
        .p-card.hot { border-color: var(--gold); background: rgba(255, 215, 0, 0.05); }
        .g-label { font-size: 10px; color: var(--gold); font-weight: bold; margin-bottom: 5px; letter-spacing: 1px; }
        .g-icons { font-size: 24px; letter-spacing: 8px; min-height: 35px; text-align: center;}
        .history { display: flex; gap: 6px; overflow-x: auto; margin-bottom: 15px; padding: 5px; border-bottom: 1px solid #222; }
        .h-node { min-width: 35px; height: 35px; background: #161b22; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 20px; border: 1px solid #30363d; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 15px; }
        .btn { background: #161b22; border: 1px solid var(--brd); border-radius: 10px; padding: 12px 0; color: #fff; cursor: pointer; }
        .btn small { display: block; font-size: 10px; color: var(--neon); margin-top: 5px; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; margin-top: 10px; }
        th { color: var(--neon); padding: 8px; border-bottom: 2px solid #333; }
        td { padding: 8px; text-align: center; border-bottom: 1px solid #111; }
    </style>
</head>
<body>

<div class="container">
    <div id="signal" class="signal-bar wait">بانتظار تحليل بيانات الشريط...</div>

    <div id="livePicks" style="display:grid; grid-template-columns: repeat(4, 1fr); gap:10px; margin-bottom:20px;"></div>

    <div style="border: 1.5px solid var(--gold); border-radius: 15px; padding: 12px; margin-bottom: 20px; background: rgba(0,0,0,0.4);">
        <div style="margin-bottom:12px;">
            <div class="g-label">OMNI 6 (3+3 - نظام التغطية)</div>
            <div id="g6" class="g-icons"></div>
        </div>
        <div style="margin-bottom:12px;">
            <div class="g-label">ULTRA 5 (3+2 - توازن اللون)</div>
            <div id="g5" class="g-icons"></div>
        </div>
        <div>
            <div class="g-label">STABLE 4 (2+2 - قناص الأمان)</div>
            <div id="g4" class="g-icons"></div>
        </div>
    </div>

    <div id="history" class="history"></div>

    <div class="grid">
        <button class="btn" onclick="add('corn')">🌽<small id="abs-corn">0</small></button>
        <button class="btn" onclick="add('tomato')">🍅<small id="abs-tomato">0</small></button>
        <button class="btn" onclick="add('carrot')">🥕<small id="abs-carrot">0</small></button>
        <button class="btn" onclick="add('pepper')">🌶️<small id="abs-pepper">0</small></button>
        <button class="btn" onclick="add('shrimp')">🦐<small id="abs-shrimp">0</small></button>
        <button class="btn" onclick="add('cow')">🐄<small id="abs-cow">0</small></button>
        <button class="btn" onclick="add('fish')">🐟<small id="abs-fish">0</small></button>
        <button class="btn" onclick="add('chicken')">🐔<small id="abs-chicken">0</small></button>
    </div>

    <table>
        <thead><tr><th>الرمز</th><th>الغياب</th><th>القوة</th><th>حالة الرادار</th></tr></thead>
        <tbody id="stats"></tbody>
    </table>

    <div style="display:flex; gap:10px; margin-top:15px;">
        <button onclick="undo()" style="flex:1; padding:12px; border-radius:10px; background:#21262d; color:#fff; border:1px solid #30363d;">تراجع</button>
        <button onclick="reset()" style="flex:1; padding:12px; border-radius:10px; background:#21262d; color:var(--red); border:1px solid #30363d;">تصفير</button>
    </div>
</div>

<script>
    const vegRed = ["tomato", "pepper"], vegYellow = ["corn", "carrot"];
    const meat = ["shrimp", "cow", "fish", "chicken"];
    const emojis = {corn:"🌽",tomato:"🍅",carrot:"🥕",pepper:"🌶️",shrimp:"🦐",cow:"🐄",fish:"🐟",chicken:"🐔"};
    const config = {corn:16, tomato:16, carrot:16, pepper:16, shrimp:12.5, cow:8, fish:5, chicken:2.5};

    let db = JSON.parse(localStorage.getItem("v100_db") || "[]");

    function add(f) { db.push(f); save(); }
    function undo() { db.pop(); save(); }
    function reset() { if(confirm("حذف كل البيانات؟")) { db = []; save(); } }
    function save() { localStorage.setItem("v100_db", JSON.stringify(db)); update(); }

    function update() {
        const len = db.length; if(len === 0) return;
        let hHTML = ""; for(let i=len-1; i>=Math.max(0, len-20); i--) hHTML += `<div class="h-node">${emojis[db[i]]}</div>`;
        document.getElementById("history").innerHTML = hHTML;

        const lastOut = db[len-1];
        const last15 = db.slice(-15);
        const repeatCount = last15.filter(x => x === lastOut).length;
        const isRigged = repeatCount >= 3; 

        let scores = {}; let reasons = {};
        [...vegRed, ...vegYellow, ...meat].forEach(f => {
            let abs = (db.lastIndexOf(f) === -1) ? Math.min(len, 120) : len - 1 - db.lastIndexOf(f);
            document.getElementById(`abs-${f}`).innerText = abs;
            let baseScore = (abs * 10) / (100 / config[f]);
            
            if (f === lastOut && isRigged) { baseScore *= 0.1; reasons[f] = "تجنب التكرار"; }
            else if (f !== lastOut && isRigged) { baseScore *= 3.5; reasons[f] = "كسر الجعفلة"; }
            else { reasons[f] = "تحليل مستمر"; }

            if (f === 'chicken' && abs < 75) baseScore *= 0.1;
            if (f === 'fish' && abs < 40) baseScore *= 0.2;
            scores[f] = baseScore;
        });

        let sorted = [...vegRed, ...vegYellow, ...meat].sort((a,b) => scores[b] - scores[a]);
        const maxS = scores[sorted[0]];
        const signal = document.getElementById("signal");
        if (maxS > 400 && len > 15) {
            signal.innerText = "🔥 SHOOT NOW: فرصة انقلاب ذهبية";
            signal.className = "signal-bar shoot";
        } else {
            signal.innerText = "⌛ WAIT: بانتظار اكتمال الدورة";
            signal.className = "signal-bar wait";
        }

        document.getElementById("livePicks").innerHTML = sorted.slice(0, 4).map(x => `
            <div class="p-card ${scores[x] > 380 ? 'hot' : ''}">
                <span class="emoji">${emojis[x]}</span>
                <span class="tag">${reasons[x]}</span>
                <span class="perc">${Math.min(99, Math.round((scores[x]/maxS)*100))}%</span>
            </div>`).join("");

        const d = (list) => list.map(x => emojis[x]).join(" ");
        let sV = [...vegRed, ...vegYellow].sort((a,b) => scores[b] - scores[a]);
        let sM = [...meat].sort((a,b) => scores[b] - scores[a]);

        document.getElementById("g6").innerText = d([...sV.slice(0,3), ...sM.slice(0,3)]);
        document.getElementById("g5").innerText = d([...sV.slice(0,3), ...sM.slice(0,2)]);
        document.getElementById("g4").innerText = d([...sV.slice(0,2), ...sM.slice(0,2)]);

        document.getElementById("stats").innerHTML = sorted.map(f => `
            <tr><td>${emojis[f]}</td><td>${document.getElementById(`abs-${f}`).innerText}</td>
            <td>${Math.round(scores[f])}</td><td style="color:var(--neon)">${reasons[f]}</td></tr>`).join("");
    }
    window.onload = update;
</script>
</body>
</html>
