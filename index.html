<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V160 MASTER PRO - FINAL</title>
    <style>
        :root { --bg: #050505; --panel: #0d1117; --brd: #30363d; --neon: #00f2ff; --win: #00ff41; --gold: #ffd700; --red: #ff4d4d; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 10px; }
        .container { max-width: 480px; margin: auto; border: 1px solid var(--brd); border-radius: 20px; padding: 15px; background: var(--panel); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        /* شريط الحالة */
        .status-bar { text-align: center; padding: 12px; border-radius: 12px; font-weight: bold; border: 1px solid transparent; margin-bottom: 15px; }
        .wait { background: rgba(255, 77, 77, 0.1); color: var(--red); border-color: var(--red); }
        .repeat-alert { background: rgba(255, 215, 0, 0.2); color: var(--gold); border-color: var(--gold); box-shadow: 0 0 15px var(--gold); }
        .shoot { background: rgba(0, 255, 65, 0.2); color: var(--win); border-color: var(--win); }

        /* الأنظمة */
        .systems-box { border: 1.5px solid var(--gold); border-radius: 15px; padding: 15px; background: rgba(0,0,0,0.4); margin-bottom: 20px; }
        .sys-label { font-size: 10px; color: var(--gold); font-weight: bold; text-align: center; margin-bottom: 5px; }
        .sys-icons { font-size: 26px; letter-spacing: 12px; min-height: 40px; text-align: center; border-bottom: 1px solid #222; margin-bottom: 12px; padding-bottom: 5px; }

        /* جدول التحليل الذكي (اللمسة الأخيرة) */
        .stats-table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 12px; text-align: center; }
        .stats-table th { color: #8b949e; padding: 10px; border-bottom: 1px solid #30363d; }
        .stats-table td { padding: 12px; border-bottom: 1px dotted #21262d; }
        .st-stable { color: var(--neon); }

        .history { display: flex; gap: 8px; overflow-x: auto; margin-bottom: 20px; padding: 10px; background: #000; border-radius: 12px; border: 1px solid #222; flex-direction: row-reverse; }
        .h-node { min-width: 40px; height: 40px; background: #161b22; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 22px; border: 1px solid #30363d; }

        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .btn { background: #161b22; border: 1px solid var(--brd); border-radius: 12px; padding: 15px 0; color: #fff; cursor: pointer; font-size: 20px; }
        .btn small { display: block; font-size: 11px; color: var(--neon); margin-top: 4px; }
        
        .footer { display: flex; gap: 10px; margin-top: 15px; }
        .f-btn { flex: 1; padding: 12px; border-radius: 10px; background: #21262d; color: #fff; font-weight: bold; border: 1px solid #333; }
    </style>
</head>
<body>

<div class="container">
    <div id="status" class="status-bar wait">⌛ مراقبة الشريط للتحليل...</div>

    <div class="systems-box">
        <div class="sys-label">OMNI 6 (3+3 - القناص)</div>
        <div id="g6" class="sys-icons">---</div>
        <div class="sys-label">ULTRA 5 (3+2 - متوازن)</div>
        <div id="g5" class="sys-icons">---</div>
        <div class="sys-label">STABLE 4 (2+2 - أمان)</div>
        <div id="g4" class="sys-icons">---</div>
    </div>

    <div id="history" class="history"></div>

    <div class="grid">
        <button class="btn" onclick="add('corn')">🌽<small id="abs-corn">0</small></button>
        <button class="btn" onclick="add('tomato')">🍅<small id="abs-tomato">0</small></button>
        <button class="btn" onclick="add('carrot')">🥕<small id="abs-carrot">0</small></button>
        <button class="btn" onclick="add('pepper')">🌶️<small id="abs-pepper">0</small></button>
        <button class="btn" onclick="add('shrimp')">🦐<small id="abs-shrimp">0</small></button>
        <button class="btn" onclick="add('cow')">🐄<small id="abs-cow">0</small></button>
        <button class="btn" onclick="add('fish')">🐟<small id="abs-fish">0</small></button>
        <button class="btn" onclick="add('chicken')">🐔<small id="abs-chicken">0</small></button>
    </div>

    <table class="stats-table">
        <thead>
            <tr>
                <th>الرمز</th>
                <th>الغياب</th>
                <th>القوة</th>
                <th>حالة الرادار</th>
            </tr>
        </thead>
        <tbody id="stats-body"></tbody>
    </table>

    <div class="footer">
        <button onclick="undo()" class="f-btn">تراجع ↩️</button>
        <button onclick="reset()" class="f-btn" style="color:var(--red);">تصفير 🗑️</button>
    </div>
</div>

<script>
    const emojis = {corn:"🌽", tomato:"🍅", carrot:"🥕", pepper:"🌶️", shrimp:"🦐", cow:"🐄", fish:"🐟", chicken:"🐔"};
    const config = {corn:16, tomato:16, carrot:16, pepper:16, shrimp:12, cow:8, fish:5, chicken:2.5};
    let db = JSON.parse(localStorage.getItem("final_pro_db") || "[]");

    function add(f) { db.push(f); save(); }
    function undo() { db.pop(); save(); }
    function reset() { if(confirm("تصفير؟")) { db = []; save(); } }
    function save() { localStorage.setItem("final_pro_db", JSON.stringify(db)); update(); }

    function update() {
        const len = db.length;
        if (len === 0) return;

        document.getElementById("history").innerHTML = db.slice(-20).map(x => `<div class="h-node">${emojis[x]}</div>`).join("");

        const last = db[len-1], secondLast = db[len-2];
        const isRepeating = (len > 1 && last === secondLast);

        let scores = {}, tableHTML = "";
        Object.keys(config).forEach(f => {
            let lastIdx = db.lastIndexOf(f);
            let abs = (lastIdx === -1) ? Math.min(len, 100) : (len - 1 - lastIdx);
            document.getElementById(`abs-${f}`).innerText = abs;

            let score = Math.round((abs * 10) / (100 / config[f]));
            if (f === last && isRepeating) score += 5000;

            scores[f] = score;

            tableHTML += `<tr>
                <td>${emojis[f]}</td>
                <td>${abs}</td>
                <td style="color:${score > 400 ? 'var(--win)' : '#fff'}">${score}</td>
                <td class="st-stable">${score > 300 ? 'STABLE' : 'تحليل مستمر'}</td>
            </tr>`;
        });

        document.getElementById("stats-body").innerHTML = tableHTML;
        let sorted = Object.keys(config).sort((a, b) => scores[b] - scores[a]);
        
        const d = (list) => list.map(x => emojis[x]).join("");
        document.getElementById("g6").innerText = d(sorted.slice(0, 6));
        document.getElementById("g5").innerText = d(sorted.slice(0, 5));
        document.getElementById("g4").innerText = d(sorted.slice(0, 4));

        const status = document.getElementById("status");
        if (isRepeating) {
            status.innerText = `🚨 تكرار نشط: ${emojis[last]}`;
            status.className = "status-bar repeat-alert";
        } else {
            status.innerText = "⌛ مراقبة الشريط للتحليل...";
            status.className = "status-bar wait";
        }
    }
    window.onload = update;
</script>
</body>
</html>
