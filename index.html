<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V3000 - GHOST AI ENGINE</title>
    <style>
        :root { --bg: #000; --neon: #bcff00; --red: #ff003c; --gold: #f5af19; }
        body { font-family: 'Courier New', monospace; background: var(--bg); color: #fff; margin: 0; padding: 10px; }
        .ghost-container { max-width: 450px; margin: auto; border: 2px solid #111; border-radius: 20px; padding: 15px; position: relative; overflow: hidden; }
        
        /* رادار الموجات */
        .wave-analyzer { height: 60px; background: #050505; border-radius: 10px; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; border: 1px solid #1a1a1a; position: relative; }
        #wave-status { font-weight: bold; font-size: 14px; letter-spacing: 2px; }
        .scanner-line { position: absolute; width: 2px; height: 100%; background: var(--neon); left: 0; animation: scan 2s infinite linear; opacity: 0.3; }
        @keyframes scan { 100% { left: 100%; } }

        .strip-box { display: flex; gap: 8px; overflow-x: auto; flex-direction: row-reverse; padding: 10px 0; border-bottom: 1px solid #111; }
        .n { min-width: 42px; height: 42px; background: #080808; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 24px; border: 1px solid #222; }

        /* التوقعات المخفية */
        .ghost-picks { min-height: 100px; display: flex; align-items: center; justify-content: center; gap: 20px; background: radial-gradient(circle, #111 0%, #000 100%); border-radius: 15px; margin: 15px 0; border: 1px dashed #333; }
        .target-item { font-size: 45px; transition: 0.5s; filter: grayscale(1); opacity: 0.3; }
        .target-item.active { filter: grayscale(0); opacity: 1; transform: scale(1.2); text-shadow: 0 0 15px var(--neon); }

        .control-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .c-btn { background: #000; border: 1px solid #1a1a1a; border-radius: 12px; padding: 22px 0; position: relative; }
        .c-btn span { font-size: 32px; z-index: 2; position: relative; }
        .heat-map { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: var(--neon); opacity: 0; transition: 0.3s; z-index: 1; }

        .mini-stats { display: flex; justify-content: space-between; font-size: 10px; color: #444; margin-top: 15px; }
    </style>
</head>
<body>

<div class="ghost-container">
    <div class="wave-analyzer">
        <div class="scanner-line"></div>
        <div id="wave-status">INITIALIZING AI...</div>
    </div>

    <div class="strip-box" id="history"></div>

    <div class="ghost-picks" id="display">
        <div style="color:#222">NO TARGETS YET</div>
    </div>

    <div class="control-grid">
        <button class="c-btn" onclick="add('corn')"><span>🌽</span><div id="h-corn" class="heat-map"></div></button>
        <button class="c-btn" onclick="add('tomato')"><span>🍅</span><div id="h-tomato" class="heat-map"></div></button>
        <button class="c-btn" onclick="add('carrot')"><span>🥕</span><div id="h-carrot" class="heat-map"></div></button>
        <button class="c-btn" onclick="add('pepper')"><span></span>🌶️<div id="h-pepper" class="heat-map"></div></button>
        <button class="c-btn" onclick="add('shrimp')"><span>🦐</span><div id="h-shrimp" class="heat-map"></div></button>
        <button class="c-btn" onclick="add('cow')"><span>🐄</span><div id="h-cow" class="heat-map"></div></button>
        <button class="c-btn" onclick="add('fish')"><span>🐟</span><div id="h-fish" class="heat-map"></div></button>
        <button class="c-btn" onclick="add('chicken')"><span>🐔</span><div id="h-chicken" class="heat-map"></div></button>
    </div>

    <div class="mini-stats">
        <span id="absent-top"></span>
        <span onclick="reset()" style="cursor:pointer; color:var(--red)">[WIPE DATA]</span>
        <span onclick="undo()" style="cursor:pointer">[UNDO]</span>
    </div>
</div>

<script>
    const emojis = {corn:"🌽", tomato:"🍅", carrot:"🥕", pepper:"🌶️", shrimp:"🦐", cow:"🐄", fish:"🐟", chicken:"🐔"};
    const mults = {corn:5, tomato:5, carrot:5, pepper:5, shrimp:10, cow:15, fish:25, chicken:45};
    const caps = {corn:100, tomato:100, carrot:100, pepper:100, shrimp:15, cow:10, fish:6, chicken:2};
    
    let db = JSON.parse(localStorage.getItem("ghost_v3_db") || "[]");

    function add(f) { db.push(f); save(); }
    function undo() { db.pop(); save(); }
    function reset() { if(confirm("تصفير الذاكرة؟")) { db = []; save(); } }
    function save() { localStorage.setItem("ghost_v3_db", JSON.stringify(db)); update(); }

    function update() {
        const len = db.length;
        document.getElementById("history").innerHTML = db.slice(-12).map(x => `<div class="n">${emojis[x]}</div>`).join("");
        if (len === 0) return;

        let last10 = db.slice(-10);
        let meats = ['shrimp', 'cow', 'fish', 'chicken'];
        let meatTrend = last10.filter(x => meats.includes(x)).length;
        
        let status = document.getElementById("wave-status");
        let display = document.getElementById("display");

        // منطق الـ Ghost Mode (الذكاء الحقيقي)
        if (meatTrend >= 4) {
            status.innerText = "DANGER: MEAT OVERLOAD";
            status.style.color = var(--red);
        } else if (last10.slice(-5).filter(x => !meats.includes(x)).length === 5) {
            status.innerText = "WAIT: SERVER DRAINING";
            status.style.color = "#555";
            display.innerHTML = "<div style='color:#333'>-- DO NOT PLAY --</div>";
            return;
        } else {
            status.innerText = "SYSTEM READY - SNIPE NOW";
            status.style.color = var(--neon);
        }

        let scores = {};
        Object.keys(emojis).forEach(f => {
            let abs = (db.lastIndexOf(f) === -1) ? len : (len - 1 - db.lastIndexOf(f));
            let c100 = db.slice(-100).filter(x => x === f).length;
            
            // سكور يعتمد على الغياب النسبي للضرب
            let score = (abs * 3) / (mults[f] / 10);
            
            // ميزة الـ Combo (لو لسه جاي يفضل في الحسابات)
            if (abs === 0) score += 50;
            if (c100 >= caps[f]) score = -999;
            
            scores[f] = score;
            document.getElementById(`h-${f}`).style.opacity = Math.min(0.6, score/200);
        });

        let top3 = Object.keys(emojis).sort((a,b) => scores[b] - scores[a]).slice(0, 3);
        display.innerHTML = top3.map(x => `<div class="target-item active">${emojis[x]}</div>`).join("");
    }
    window.onload = update;
</script>
</body>
</html>
