<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V1000 - THE SUPREME BEAST</title>
    <style>
        :root { --bg: #000; --panel: #0d0d0d; --gold: #ffd700; --neon: #00f2ff; --red: #ff3131; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 5px; }
        .container { max-width: 450px; margin: auto; border: 1px solid #222; border-radius: 20px; padding: 10px; background: var(--panel); }
        .ai-status { text-align: center; font-size: 10px; color: var(--neon); margin-bottom: 8px; border: 1px solid #1a1a1a; padding: 5px; border-radius: 10px; }
        .target-box { background: radial-gradient(circle, #111, #000); border: 2px solid var(--gold); border-radius: 20px; padding: 20px; text-align: center; margin-bottom: 10px; }
        .target-emoji { font-size: 70px; display: block; filter: drop-shadow(0 0 20px var(--gold)); }
        .history { display: flex; gap: 5px; overflow-x: auto; margin-bottom: 10px; padding: 10px; background: #050505; border-radius: 12px; flex-direction: row-reverse; }
        .h-node { min-width: 35px; height: 35px; background: #111; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 20px; border: 1px solid #222; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .btn { background: #111; border: 1px solid #222; border-radius: 12px; padding: 15px 0; color: #fff; position: relative; overflow: hidden; }
        .btn span { font-size: 26px; position: relative; z-index: 2; }
        .charge-bar { position: absolute; bottom: 0; left: 0; height: 4px; background: var(--gold); transition: width 0.3s; z-index: 1; }
        .stats-table { width: 100%; margin-top: 20px; font-size: 11px; text-align: center; color: #666; }
        .active-pattern { color: var(--gold); font-weight: bold; font-size: 12px; margin-bottom: 5px; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <div id="ai-msg" class="ai-status">جارٍ فك شفرة السيرفر...</div>
    <div id="pattern-display" class="active-pattern">PATTERN: ANALYZING</div>

    <div class="target-box">
        <div id="target-emoji" class="target-emoji">❓</div>
        <div style="font-size: 11px; color: var(--gold); font-weight: bold; margin-top: 10px;">التوقع الذكي (ضد السيرفر)</div>
    </div>

    <div id="history" class="history"></div>

    <div class="grid">
        <button class="btn" onclick="add('corn')"><span>🌽</span><div id="bar-corn" class="charge-bar"></div></button>
        <button class="btn" onclick="add('tomato')"><span>🍅</span><div id="bar-tomato" class="charge-bar"></div></button>
        <button class="btn" onclick="add('carrot')"><span>🥕</span><div id="bar-carrot" class="charge-bar"></div></button>
        <button class="btn" onclick="add('pepper')"><span>🌶️</span><div id="bar-pepper" class="charge-bar"></div></button>
        <button class="btn" onclick="add('shrimp')"><span>🦐</span><div id="bar-shrimp" class="charge-bar"></div></button>
        <button class="btn" onclick="add('cow')"><span>🐄</span><div id="bar-cow" class="charge-bar"></div></button>
        <button class="btn" onclick="add('fish')"><span>🐟</span><div id="bar-fish" class="charge-bar"></div></button>
        <button class="btn" onclick="add('chicken')"><span>🐔</span><div id="bar-chicken" class="charge-bar"></div></button>
    </div>

    <table class="stats-table">
        <thead><tr><th>الصنف</th><th>تكرار/100</th><th>قوة الاحتمال</th></tr></thead>
        <tbody id="radar-body"></tbody>
    </table>

    <div style="display:flex; gap:5px; margin-top:15px;">
        <button onclick="undo()" style="flex:1; padding:12px; background:#111; color:#555; border:none; border-radius:10px;">تراجع</button>
        <button onclick="reset()" style="flex:1; padding:12px; background:#300; color:#999; border:none; border-radius:10px;">تصفير</button>
    </div>
</div>

<script>
    const emojis = {corn:"🌽", tomato:"🍅", carrot:"🥕", pepper:"🌶️", shrimp:"🦐", cow:"🐄", fish:"🐟", chicken:"🐔"};
    // أوزان السيرفر حسب كلامك
    const caps = {shrimp:15, cow:10, fish:6, chicken:4}; 
    const veggies = ['corn', 'tomato', 'carrot', 'pepper'];
    const meats = ['shrimp', 'cow', 'fish', 'chicken'];
    
    let db = JSON.parse(localStorage.getItem("v1000_supreme_db") || "[]");

    function add(f) { db.push(f); save(); }
    function undo() { db.pop(); save(); }
    function reset() { if(confirm("تصفير الذاكرة؟")) { db = []; save(); } }
    function save() { localStorage.setItem("v1000_supreme_db", JSON.stringify(db)); update(); }

    function update() {
        const len = db.length;
        document.getElementById("history").innerHTML = db.slice(-20).map(x => `<div class="h-node">${emojis[x]}</div>`).join("");
        if (len === 0) return;

        // تحليل المجموعة (3+2 / 3+3)
        let last4 = db.slice(-4);
        let vegCount = last4.filter(x => veggies.includes(x)).length;
        let isDualLoop = (len > 3 && db[len-1] === db[len-3] && db[len-2] === db[len-4]); // كشف تكرار صنفين

        document.getElementById("pattern-display").innerText = isDualLoop ? "ALERT: DUAL LOOP DETECTED" : "PATTERN: " + (vegCount >= 3 ? "MAX VEGGIES REACHED" : "BALANCED");

        let tableHTML = "", maxScore = -1, bestTarget = "";
        let scores = {};

        Object.keys(emojis).forEach(f => {
            let lastIdx = db.lastIndexOf(f);
            let abs = (lastIdx === -1) ? 100 : (len - 1 - lastIdx);
            let countIn100 = db.slice(-100).filter(x => x === f).length;
            
            let score = 0;

            // 1. قاعدة الـ 4 خضار المستحيلة
            if (veggies.includes(f) && vegCount >= 3) {
                score = -100; // منع كامل
            } else {
                score = abs * 2; // غياب أطول = احتمال أكبر
            }

            // 2. تطبيق أسقف اللحوم
            if (meats.includes(f)) {
                if (countIn100 >= caps[f]) score -= 200; // لو الصنف استنفذ حصته
                if (vegCount >= 2) score += 50; // تعويض المجموعة
            }

            // 3. ذكاء التكرار والثنائيات
            if (isDualLoop && (f === db[len-1] || f === db[len-2])) score += 150;
            if (f === db[len-1] && db[len-1] === db[len-2]) score += 80; // موجة تكرار

            scores[f] = score;
            if (score > maxScore) { maxScore = score; bestTarget = f; }

            let displayPct = Math.min(100, Math.max(0, score));
            document.getElementById(`bar-${f}`).style.width = displayPct + "%";
            tableHTML += `<tr><td>${emojis[f]}</td><td>${countIn100}/${caps[f] || '--'}</td><td>${displayPct}%</td></tr>`;
        });

        document.getElementById("radar-body").innerHTML = tableHTML;
        document.getElementById("target-emoji").innerText = emojis[bestTarget];
        document.getElementById("ai-msg").innerText = "AI ENGINE: " + (maxScore > 100 ? "HIGH CONFIDENCE" : "SCANNING...");
    }
    window.onload = update;
</script>
</body>
</html>
